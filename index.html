<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>期末專題-線上點餐系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="text-center mb-4">🍔 智慧點餐機 🍟</h1>
    
    <div class="row text-center">
        <div class="col">
            <div class="card p-3 shadow-sm">
                <h3>牛肉堡</h3>
                <p class="text-success">$120</p>
                <button class="btn btn-primary" onclick="sendOrder('牛肉堡', 120)">點我點餐</button>
            </div>
        </div>
        <div class="col">
            <div class="card p-3 shadow-sm">
                <h3>大薯條</h3>
                <p class="text-success">$50</p>
                <button class="btn btn-primary" onclick="sendOrder('大薯條', 50)">點我點餐</button>
            </div>
        </div>
    </div>

    <script>
        // 這段 JavaScript 負責把點餐資料，透過網路傳給你的 C++ 後端
        function sendOrder(itemName, price) {
            fetch('http://localhost:8080/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ item: itemName, price: price })
            })
            .then(response => response.text())
            .then(data => {
                alert("後端 C++ 回傳： " + data);
            });
        }
    </script>
</body>
</html>
